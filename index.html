<!DOCTYPE html>
<html lang="en">
<script src = "script.js"></script>
<link rel="stylesheet" href="styles.css">
<head>
<title>Bowling Scores App</title>
<link rel="shortcut icon" type="image/x-icon" href="bowlingPinFavicon.ico">
<h1></h1>
<h1 class = "title page">BOWLING SCORES APP</h1>
<h2 class="subtitle page">Press buttons to input score:</h2>
<p class="subtitle page">Website structure is currently broken as I am redesigning the page</h2>
</head>
<body>
<div class="buttons page">
<button class="pin-count-1" id="buttons" onclick="addPins(1)">1</button>
<button class="pin-count-2" onclick="addPins(2)">2</button>
<button class="pin-count-3" onclick="addPins(3)">3</button>
</div>
<div class="buttons page">
<button class="pin-count-4" onclick="addPins(4)">4</button>
<button class="pin-count-5" onclick="addPins(5)">5</button>
<button class="pin-count-6" onclick="addPins(6)">6</button>
</div>
<div class="buttons page">
<button class="pin-count-7" onclick="addPins(7)">7</button>
<button class="pin-count-8" onclick="addPins(8)">8</button>
<button class="pin-count-9" onclick="addPins(9)">9</button>
</div>
<div class="buttons page">
<button class="gutter-ball" id="buttons" onclick="addPins(0)">-</button>
<button class="spare" onclick="addSpare()">/</button>
<button class="strike" onclick="addStrike()">X</button>
</div>
<div class="buttons page">
<button class="restart-game" onclick="restartGame()">Restart Game</button>
</div>
<div class="scoresheet">
  <div id="frame1" class="frame1 frames">
    <div id="shot1" class="shot1 shots"> </div>
    <div id="frame1box" class="frame1box frameboxes"> </div>
  </div>
  <div id="frame2" class="frame2 frames">
    <div id="shot2" class="shot2 shots"> </div>
    <div id="frame2box" class="frame2box frameboxes"> </div>
  </div>
  <div id="frame3" class="frame3 frames">
    <div id="shot3" class="shot3 shots"> </div>
    <div id="frame3box" class="frame3box frameboxes"> </div>
  </div>
  <div id="frame4" class="frame4 frames">
    <div id="shot4" class="shot4 shots"> </div>
    <div id="frame4box" class="frame4box frameboxes"> </div>
  </div>
  <div id="frame5" class="frame5 frames">
    <div id="shot5" class="shot5 shots"> </div>
    <div id="frame5box" class="frame5box frameboxes"> </div>
  </div>
  <div id="frame6" class="frame6 frames">
    <div id="shot6" class="shot6 shots"> </div>
    <div id="frame6box" class="frame6box frameboxes"> </div>
  </div>
  <div id="frame7" class="frame7 frames">
    <div id="shot7" class="shot7 shots"> </div>
    <div id="frame7box" class="frame7box frameboxes"> </div>
  </div>
  <div id="frame8" class="frame8 frames">
    <div id="shot8" class="shot8 shots"> </div>
    <div id="frame8box" class="frame8box frameboxes"> </div>
  </div>
  <div id="frame9" class="frame9 frames">
    <div id="shot9" class="shot9 shots"> </div>
    <div id="frame9box" class="frame9box frameboxes"> </div>
  </div>
  <div id="frame10" class="frame10 frames">
    <div id="shot10" class="shot10 shots"> </div>
    <div id="frame10box1" class="frame10box1"> </div>
    <div id="frame10box2" class="frame10box2"> </div>
    <div id="score" class="score">0</div>
  </div>
</div>
<div id="sidenav" class="sidenav">
  <a href="https://linkgoesbowling.github.io/Bowling-Scores-App/">Add score</a>
</div>
</body>
</html>
