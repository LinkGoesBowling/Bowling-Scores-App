<!DOCTYPE html>
<html lang="en">
<script src = "script.js"></script>
<link rel="stylesheet" href="styles.css">
<head>
<title>Bowling Scores App</title>
<link rel="shortcut icon" type="image/x-icon" href="bowlingPinFavicon.ico">
<h1></h1>
<h1 class = "title page">BOWLING SCORES APP</h1>
<h2 class="subtitle page">Press buttons to input score: (only logged in console so far)</h2>
</head>
<body>
<div class="buttons page">
<button class="pin-count-1" id="buttons" onclick="addPins(1)">1</button>
<button class="pin-count-2" onclick="addPins(2)">2</button>
<button class="pin-count-3" onclick="addPins(3)">3</button>
</div>
<div class="buttons page">
<button class="pin-count-4" onclick="addPins(4)">4</button>
<button class="pin-count-5" onclick="addPins(5)">5</button>
<button class="pin-count-6" onclick="addPins(6)">6</button>
</div>
<div class="buttons page">
<button class="pin-count-7" onclick="addPins(7)">7</button>
<button class="pin-count-8" onclick="addPins(8)">8</button>
<button class="pin-count-9" onclick="addPins(9)">9</button>
</div>
<div class="buttons page">
<button class="gutter-ball" id="buttons" onclick="addPins(0)">-</button>
<button class="spare" onclick="addSpare()">/</button>
<button class="strike" onclick="addStrike()">X</button>
</div>
<div class="buttons page">
<button class="restart-game" onclick="restartGame()">Restart Game</button>
</div>
<div>
<img src="bowlingScoreSheet.png" width="1305px" height="309px"> <!-- credit: istockphoto -->
<p id="score" class="score">0</p>
<p id="shot1" class="shot1">1</p>
<p id="shot2" class="shot2">2</p>
<p id="shot3" class="shot3">3</p>
<p id="shot4" class="shot4">4</p>
<p id="shot5" class="shot5">5</p>
<p id="shot6" class="shot6">6</p>
<p id="shot7" class="shot7">7</p>
<p id="shot8" class="shot8">8</p>
<p id="shot9" class="shot9">9</p>
<p id="shot10" class="shot10">10</p>
<p id="shot11" class="shot11">11</p>
<p id="shot12" class="shot12">12</p>
<p id="shot13" class="shot13">13</p>
<p id="shot14" class="shot14">14</p>
<p id="shot15" class="shot15">15</p>
<p id="shot16" class="shot16">16</p>
<p id="shot17" class="shot17">17</p>
<p id="shot18" class="shot18">18</p>
<p id="shot19" class="shot19">19</p>
<p id="shot20" class="shot20">20</p>
<p id="shot21" class="shot21">21</p>
<p id="shot22" class="shot22">22</p>
</div>
</body>
</html>
